plugins {
    id 'com.android.application'
}

android {
    namespace "com.mycompany.my3dgame"
    compileSdk 33
    
    defaultConfig {
        applicationId "com.mycompany.my3dgame"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            debuggable false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    lintOptions {
        abortOnError false
    }
}
